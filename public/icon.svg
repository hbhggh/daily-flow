<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#1a1f2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Pipeline nodes -->
  <circle cx="256" cy="140" r="36" fill="url(#accent)" opacity="0.9"/>
  <circle cx="256" cy="260" r="36" fill="url(#accent)" opacity="0.7"/>
  <circle cx="256" cy="380" r="36" fill="url(#accent)" opacity="0.5"/>
  <!-- Connector lines -->
  <line x1="256" y1="176" x2="256" y2="224" stroke="#4ade80" stroke-width="4" stroke-dasharray="8 4"/>
  <line x1="256" y1="296" x2="256" y2="344" stroke="#4ade80" stroke-width="4" stroke-dasharray="8 4"/>
  <!-- Check marks -->
  <polyline points="240,140 252,152 276,128" fill="none" stroke="#0a0e17" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="240,260 252,272 276,248" fill="none" stroke="#0a0e17" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow on last node -->
  <polygon points="250,372 262,388 256,388 256,372" fill="#0a0e17" transform="translate(-3, -2)"/>
  <rect x="248" y="370" width="16" height="20" rx="2" fill="#0a0e17"/>
</svg>
